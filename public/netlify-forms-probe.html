<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms Probe</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <!-- This hidden form ensures Netlify detects form names & fields at build time -->
    <form name="projektfragebogen" data-netlify="true" netlify-honeypot="bot-field" style="display:none">
      <input type="hidden" name="form-name" value="projektfragebogen" />
      <input type="hidden" name="bot-field" value="" />
      <input type="hidden" name="name" value="" />
      <input type="hidden" name="email" value="" />
      <input type="hidden" name="phone" value="" />
      <input type="hidden" name="budget" value="" />
      <input type="hidden" name="deadline" value="" />
      <input type="hidden" name="services" value="" />
      <input type="hidden" name="message" value="" />
    </form>
  </body>
  </html>
